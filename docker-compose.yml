version: "3"

services:
  database:
    image: postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - "POSTGRES_PASSWORD=GjsaYdhj#WbcUg6hXR^QjNhzHf836aQK"
    volumes:
      - ./dc/database/data:/var/lib/postgresql/data
    # ports:
    #   - 5002:5432

  app:
    build:
      context: ./
      dockerfile: DockerFileApp
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 5000:5000
        
  core:
    build:
      context: ./
      dockerfile: DockerFileCore
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 5001:5000